# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build and deploy container app to Azure Web App - projeto-quinta-fatec

on:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read #This is required for actions/checkout

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

- name: Log in to container registry
        uses: docker/login-action@v2
        with:
          registry: docker.io
          username: luis335  
          password: ${{ secrets.AZUREAPPSERVICE_CONTAINERPASSWORD_15BC6087D0F24E7FA65A17875CB526A9 }}

      - name: Log in to container registry
        uses: docker/login-action@v2
        with:
          registry: docker.io
          username: luis335  # COLOQUE SEU USUÁRIO DO DOCKER HUB AQUI (TUDO MINÚSCULO)
          password: ${{ secrets.AZUREAPPSERVICE_CONTAINERPASSWORD_15BC6087D0F24E7FA65A17875CB526A9 }}

      - name: Build and push container image to registry
        uses: docker/build-push-action@v3
        with:
          context: .
          push: true
          # Mudamos o nome para evitar conflito com o 'nginx' oficial
          tags: docker.io/luis335/projeto-fatec:latest 
          file: ./Dockerfile
  deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write #This is required for requesting the JWT
      contents: read #This is required for actions/checkout

    needs: build
    
    steps:
      
      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_8C5FDA330FCD4E4BA266110F55E87341 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_D2F31100BFEA48BCA71FA4E6EAD810F1 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_CE94EB723BDA4CACB1623DD5ACF6F53D }}

      - name: Deploy to Azure Web App
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v2
        with:
          app-name: 'projeto-quinta-fatec'
          slot-name: 'Production'
          images: 'index.docker.io/${{ secrets.AZUREAPPSERVICE_CONTAINERUSERNAME_9F2FE7C910324E348DD7DF0D9C4AE4CD }}/nginx:${{ github.sha }}'
          
